server:
  port: 8080

spring:
  application:
    name: campus-mart

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_mart?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234567

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campusmart.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: CampusMartSecretKey2026CampusMartSecretKey2026CampusMartSecretKey
  expiration: 86400000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  public-api-url: ${PUBLIC_API_URL:http://localhost:8080}
  upload:
    path: ../public/images/
    base-url: /images/

alipay:
  app-id: 9021000150656831
  private-key: 
  alipay-public-key: 
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  return-url: ${app.public-api-url}/api/alipay/return
  notify-url: ${app.public-api-url}/api/alipay/notify

chatbot:
  api-key: ${CHATBOT_API_KEY:sk-co7r8mnnjxw4jiplc52ugbvzvka4caauco187sr5o4kwq82u}
  base-url: ${CHATBOT_BASE_URL:https://api.xiaomimimo.com/anthropic}
  model: ${CHATBOT_MODEL:mimo-v2.5}
